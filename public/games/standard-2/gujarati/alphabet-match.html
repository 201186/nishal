<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>અક્ષર અને શબ્દ જોડો</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 24px 16px;
      font-family: Arial, "Noto Sans Gujarati", sans-serif;
      color: #1e293b;
      background:
        radial-gradient(circle at 10% 10%, #dbeafe 0, transparent 25%),
        radial-gradient(circle at 90% 20%, #fce7f3 0, transparent 25%),
        linear-gradient(135deg, #f8fafc, #eef2ff);
    }

    .game {
      width: 100%;
      max-width: 850px;
      margin: auto;
    }

    .top {
      text-align: center;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      padding: 7px 14px;
      margin-bottom: 12px;
      border-radius: 999px;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(28px, 5vw, 42px);
      color: #0f172a;
    }

    .subtitle {
      margin-top: 8px;
      color: #64748b;
      font-size: 17px;
    }

    .status-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 22px 0;
      flex-wrap: wrap;
    }

    .status {
      min-width: 130px;
      padding: 11px 18px;
      text-align: center;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      font-weight: 700;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .column-title {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .card {
      min-height: 76px;
      width: 100%;
      padding: 14px;
      border: 2px solid transparent;
      border-radius: 20px;
      background: white;
      color: #1e293b;
      font-size: 23px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 7px 20px rgba(15, 23, 42, 0.07);
      transition:
        transform 0.18s ease,
        border-color 0.18s ease,
        background 0.18s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #818cf8;
    }

    .letter-card {
      font-size: 30px;
      background: linear-gradient(135deg, #ffffff, #eef2ff);
    }

    .word-card {
      background: linear-gradient(135deg, #ffffff, #fdf2f8);
    }

    .card.selected {
      border-color: #6366f1;
      background: #e0e7ff;
      transform: scale(1.03);
    }

    .card.correct {
      border-color: #22c55e;
      background: #dcfce7;
      color: #166534;
      cursor: default;
      box-shadow: none;
    }

    .card.wrong {
      border-color: #ef4444;
      background: #fee2e2;
      animation: shake 0.3s ease;
    }

    .message {
      min-height: 36px;
      margin-top: 24px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .restart {
      display: none;
      margin: 18px auto 0;
      padding: 14px 28px;
      border: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.25);
    }

    .restart:hover {
      transform: translateY(-2px);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px 10px;
      }

      .board {
        gap: 9px;
      }

      .card {
        min-height: 66px;
        padding: 9px;
        border-radius: 15px;
        font-size: 17px;
      }

      .letter-card {
        font-size: 25px;
      }

      .status {
        min-width: 110px;
        padding: 9px 12px;
      }
    }
  </style>
</head>

<body>

  <main class="game">

    <header class="top">
      <div class="badge">ધોરણ 2 • ગુજરાતી</div>
      <h1>🎯 અક્ષર અને શબ્દ જોડો</h1>
      <p class="subtitle">
        અક્ષર પસંદ કરો અને તે અક્ષરથી શરૂ થતો સાચો શબ્દ શોધો
      </p>
    </header>

    <div class="status-bar">
      <div class="status">
        ⭐ સ્કોર: <span id="score">0</span> / 5
      </div>

      <div class="status">
        🎯 બાકી: <span id="remaining">5</span>
      </div>
    </div>

    <section class="board">

      <div class="column" id="letters">
        <div class="column-title">અક્ષર પસંદ કરો</div>

        <button class="card letter-card" data-id="ch">ચ</button>
        <button class="card letter-card" data-id="j">જ</button>
        <button class="card letter-card" data-id="p">પ</button>
        <button class="card letter-card" data-id="v">વ</button>
        <button class="card letter-card" data-id="s">સ</button>
      </div>

      <div class="column" id="words">
        <div class="column-title">સાચો શબ્દ પસંદ કરો</div>

        <button class="card word-card" data-id="v">વાંદરો 🐒</button>
        <button class="card word-card" data-id="p">પતંગ 🪁</button>
        <button class="card word-card" data-id="s">સસલું 🐇</button>
        <button class="card word-card" data-id="ch">ચકલી 🐦</button>
        <button class="card word-card" data-id="j">જહાજ 🚢</button>
      </div>

    </section>

    <div class="message" id="message">
      👆 પહેલા એક અક્ષર પસંદ કરો
    </div>

    <button class="restart" id="restart">
      🔄 ફરી રમો
    </button>

  </main>

  <script>
    const letterCards = document.querySelectorAll("#letters .card");
    const wordCards = document.querySelectorAll("#words .card");

    const scoreElement = document.getElementById("score");
    const remainingElement = document.getElementById("remaining");
    const messageElement = document.getElementById("message");
    const restartButton = document.getElementById("restart");

    let selectedLetter = null;
    let score = 0;
    const total = 5;

    letterCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (card.classList.contains("correct")) return;

        letterCards.forEach((item) => {
          if (!item.classList.contains("correct")) {
            item.classList.remove("selected");
          }
        });

        selectedLetter = card;
        card.classList.add("selected");

        messageElement.textContent =
          "✨ હવે સાચો શબ્દ પસંદ કરો";
      });
    });

    wordCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (!selectedLetter || card.classList.contains("correct")) {
          return;
        }

        if (selectedLetter.dataset.id === card.dataset.id) {
          selectedLetter.classList.remove("selected");
          selectedLetter.classList.add("correct");
          card.classList.add("correct");

          score++;

          scoreElement.textContent = score;
          remainingElement.textContent = total - score;

          selectedLetter = null;

          if (score === total) {
            messageElement.textContent =
              "🎉 શાબાશ! તમે બધા સાચા જોડકાં શોધી લીધાં!";

            restartButton.style.display = "block";
          } else {
            messageElement.textContent =
              "✅ ખૂબ સરસ! હવે આગળનું જોડકું શોધો";
          }
        } else {
          const wrongLetter = selectedLetter;

          wrongLetter.classList.add("wrong");
          card.classList.add("wrong");

          messageElement.textContent =
            "❌ આ જોડકું સાચું નથી. ફરી પ્રયત્ન કરો";

          setTimeout(() => {
            wrongLetter.classList.remove("wrong");
            card.classList.remove("wrong");
          }, 450);
        }
      });
    });

    restartButton.addEventListener("click", () => {
      location.reload();
    });
  </script>

</body>
</html>
