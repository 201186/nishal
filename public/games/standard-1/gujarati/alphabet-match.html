<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>અક્ષર જોડો</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
    }

    body {
      font-family: Arial, "Noto Sans Gujarati", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: clamp(10px, 2vw, 20px);
    }

    .game {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: clamp(12px, 2vw, 20px);
    }

    .header h1 {
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.2;
    }

    .header p {
      margin-top: 6px;
      color: #64748b;
      font-size: clamp(14px, 1.4vw, 17px);
    }

    .score {
      width: fit-content;
      margin: clamp(12px, 2vw, 18px) auto;
      padding: 8px 18px;
      border-radius: 12px;
      background: white;
      font-size: clamp(14px, 1.3vw, 17px);
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 2vw, 18px);
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.5vw, 12px);
    }

    .card {
      width: 100%;
      min-height: clamp(52px, 7vh, 66px);
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: white;
      padding: 10px 12px;
      color: #1e293b;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #6366f1;
    }

    .card.selected {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .card.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }

    .card.wrong {
      border-color: #dc2626;
      background: #fee2e2;
    }

    .message {
      min-height: 28px;
      margin-top: clamp(14px, 2vw, 20px);
      text-align: center;
      font-size: clamp(16px, 1.8vw, 20px);
      font-weight: 700;
    }

    .restart {
      display: none;
      margin: 14px auto 0;
      border: 0;
      border-radius: 12px;
      padding: 11px 22px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .restart:hover {
      background: #4338ca;
      transform: translateY(-1px);
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .game {
        max-width: 100%;
      }

      .board {
        gap: 8px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 56px;
        padding: 8px;
        font-size: 18px;
      }
    }

    /* Laptop / TV / Smart Board */
    @media (min-width: 700px) and (max-height: 850px) {
      body {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .game {
        width: min(100%, 700px);
      }

      .header {
        margin-bottom: 10px;
      }

      .header h1 {
        font-size: 30px;
      }

      .header p {
        font-size: 15px;
      }

      .score {
        margin: 10px auto;
        padding: 7px 16px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 52px;
        padding: 8px 10px;
        font-size: 19px;
      }

      .message {
        min-height: 24px;
        margin-top: 12px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="game">

    <!-- Header -->
    <div class="header">
      <h1>🎯 અક્ષર જોડો</h1>

      <p>
        અક્ષરને તેના સાચા શબ્દ સાથે જોડો
      </p>
    </div>

    <!-- Score -->
    <div class="score">
      સ્કોર:
      <span id="score">0</span>
      /
      <span id="total">5</span>
    </div>

    <!-- Game Board -->
    <div class="board">

      <!-- Letters -->
      <div
        class="column"
        id="letters"
      ></div>

      <!-- Words -->
      <div
        class="column"
        id="words"
      ></div>

    </div>

    <!-- Message -->
    <div
      class="message"
      id="message"
    ></div>

    <!-- Restart -->
    <button
      class="restart"
      id="restart"
      type="button"
    >
      🔄 નવી રમત રમો
    </button>

  </main>


  <!-- ========================================
       GAME SOUNDS
  ========================================= -->

  <audio
    id="correctSound"
    src="/sounds/correct.mp3"
    preload="auto"
  ></audio>

  <audio
    id="wrongSound"
    src="/sounds/wrong.mp3"
    preload="auto"
  ></audio>

  <audio
    id="completeSound"
    src="/sounds/complete.mp3"
    preload="auto"
  ></audio>


  <script>

    /* ========================================
       50 અક્ષર અને શબ્દોની જોડીઓ
    ======================================== */

    const allPairs = [
      { letter: "ક", word: "કમળ" },
      { letter: "ખ", word: "ખટારો" },
      { letter: "ગ", word: "ગાય" },
      { letter: "ઘ", word: "ઘર" },
      { letter: "ચ", word: "ચકલી" },

      { letter: "છ", word: "છત્રી" },
      { letter: "જ", word: "જહાજ" },
      { letter: "ઝ", word: "ઝરણું" },
      { letter: "ટ", word: "ટમેટું" },
      { letter: "ઠ", word: "ઠેલો" },

      { letter: "ડ", word: "ડમરુ" },
      { letter: "ઢ", word: "ઢોલ" },
      { letter: "ત", word: "તલવાર" },
      { letter: "થ", word: "થાળી" },
      { letter: "દ", word: "દડો" },

      { letter: "ધ", word: "ધનુષ" },
      { letter: "ન", word: "નળ" },
      { letter: "પ", word: "પતંગ" },
      { letter: "ફ", word: "ફળ" },
      { letter: "બ", word: "બકરી" },

      { letter: "ભ", word: "ભમરો" },
      { letter: "મ", word: "મગર" },
      { letter: "ય", word: "યજ્ઞ" },
      { letter: "ર", word: "રથ" },
      { letter: "લ", word: "લસણ" },

      { letter: "વ", word: "વાઘ" },
      { letter: "શ", word: "શેરડી" },
      { letter: "સ", word: "સસલું" },
      { letter: "હ", word: "હરણ" },

      { letter: "ક", word: "કબૂતર" },
      { letter: "ગ", word: "ગણપતિ" },
      { letter: "ચ", word: "ચમચી" },
      { letter: "જ", word: "જામફળ" },
      { letter: "ટ", word: "ટોપી" },

      { letter: "ડ", word: "ડાળી" },
      { letter: "ત", word: "તડબૂચ" },
      { letter: "દ", word: "દરવાજો" },
      { letter: "ન", word: "નાળિયેર" },
      { letter: "પ", word: "પતંગિયું" },

      { letter: "ફ", word: "ફુગ્ગો" },
      { letter: "બ", word: "બતક" },
      { letter: "મ", word: "મકાઈ" },
      { letter: "ર", word: "રમકડું" },
      { letter: "લ", word: "લીંબુ" },

      { letter: "વ", word: "વાંદરો" },
      { letter: "શ", word: "શાક" },
      { letter: "સ", word: "સફરજન" },
      { letter: "હ", word: "હાથી" },
      { letter: "ઘ", word: "ઘડિયાળ" },
      { letter: "છ", word: "છોકરો" }
    ];


    /* ========================================
       ELEMENTS
    ======================================== */

    const lettersContainer =
      document.getElementById("letters");

    const wordsContainer =
      document.getElementById("words");

    const scoreElement =
      document.getElementById("score");

    const totalElement =
      document.getElementById("total");

    const messageElement =
      document.getElementById("message");

    const restartButton =
      document.getElementById("restart");


    /* ========================================
       SOUND ELEMENTS
    ======================================== */

    const correctSound =
      document.getElementById("correctSound");

    const wrongSound =
      document.getElementById("wrongSound");

    const completeSound =
      document.getElementById("completeSound");


    /* ========================================
       GAME SETTINGS
    ======================================== */

    const PAIRS_PER_GAME = 5;

    let selectedLetter = null;

    let score = 0;


    /* ========================================
       PLAY SOUND
    ======================================== */

    function playSound(audio) {

      if (!audio) {
        return;
      }

      audio.pause();

      audio.currentTime = 0;

      const playPromise =
        audio.play();

      if (
        playPromise !==
        undefined
      ) {

        playPromise.catch(
          () => {
            /*
              Browser sound block કરે
              તો game ચાલુ રહેશે.
            */
          }
        );

      }

    }


    /* ========================================
       STOP ALL SOUNDS
    ======================================== */

    function stopAllSounds() {

      [
        correctSound,
        wrongSound,
        completeSound
      ].forEach(
        (audio) => {

          if (!audio) {
            return;
          }

          audio.pause();

          audio.currentTime = 0;

        }
      );

    }


    /* ========================================
       SHUFFLE
    ======================================== */

    function shuffle(array) {

      const newArray = [...array];

      for (
        let i = newArray.length - 1;
        i > 0;
        i--
      ) {

        const randomIndex =
          Math.floor(
            Math.random() * (i + 1)
          );

        [
          newArray[i],
          newArray[randomIndex]
        ] = [
          newArray[randomIndex],
          newArray[i]
        ];

      }

      return newArray;
    }


    /* ========================================
       START NEW GAME
    ======================================== */

    function startGame() {

      /* Stop old sounds */
      stopAllSounds();


      /* Reset game */

      score = 0;

      selectedLetter = null;

      scoreElement.textContent =
        "0";

      totalElement.textContent =
        PAIRS_PER_GAME;

      messageElement.textContent =
        "";

      restartButton.style.display =
        "none";

      lettersContainer.innerHTML =
        "";

      wordsContainer.innerHTML =
        "";


      /* Random 5 pairs */

      const selectedPairs =
        shuffle(allPairs)
          .slice(
            0,
            PAIRS_PER_GAME
          );


      /* Add unique ID */

      const gamePairs =
        selectedPairs.map(
          (pair, index) => ({
            ...pair,
            id: String(index)
          })
        );


      /* Create Letter Cards */

      gamePairs.forEach(
        (pair) => {

          const button =
            document.createElement(
              "button"
            );

          button.type =
            "button";

          button.className =
            "card";

          button.textContent =
            pair.letter;

          button.dataset.id =
            pair.id;

          lettersContainer.appendChild(
            button
          );

        }
      );


      /* Create Random Word Cards */

      const shuffledWords =
        shuffle(gamePairs);


      shuffledWords.forEach(
        (pair) => {

          const button =
            document.createElement(
              "button"
            );

          button.type =
            "button";

          button.className =
            "card";

          button.textContent =
            pair.word;

          button.dataset.id =
            pair.id;

          wordsContainer.appendChild(
            button
          );

        }
      );


      /* Add Click Events */

      addGameEvents();

    }


    /* ========================================
       GAME EVENTS
    ======================================== */

    function addGameEvents() {

      const letterCards =
        document.querySelectorAll(
          "#letters .card"
        );

      const wordCards =
        document.querySelectorAll(
          "#words .card"
        );


      /* ========================================
         LETTER CLICK
      ======================================== */

      letterCards.forEach(
        (card) => {

          card.addEventListener(
            "click",
            () => {

              if (
                card.classList.contains(
                  "correct"
                )
              ) {
                return;
              }


              letterCards.forEach(
                (item) => {

                  if (
                    !item.classList.contains(
                      "correct"
                    )
                  ) {

                    item.classList.remove(
                      "selected"
                    );

                  }

                }
              );


              selectedLetter =
                card;

              card.classList.add(
                "selected"
              );


              messageElement.textContent =
                "હવે સાચો શબ્દ પસંદ કરો";

            }
          );

        }
      );


      /* ========================================
         WORD CLICK
      ======================================== */

      wordCards.forEach(
        (card) => {

          card.addEventListener(
            "click",
            () => {

              if (
                !selectedLetter ||
                card.classList.contains(
                  "correct"
                )
              ) {
                return;
              }


              /* ========================================
                 CORRECT MATCH
              ======================================== */

              if (
                selectedLetter.dataset.id ===
                card.dataset.id
              ) {

                selectedLetter.classList.remove(
                  "selected"
                );

                selectedLetter.classList.add(
                  "correct"
                );

                card.classList.add(
                  "correct"
                );


                score++;

                scoreElement.textContent =
                  score;


                selectedLetter =
                  null;


                /* ========================================
                   GAME COMPLETE
                ======================================== */

                if (
                  score ===
                  PAIRS_PER_GAME
                ) {

                  /*
                    Last answer પર correct sound નહીં,
                    સીધો complete sound play થશે.
                  */

                  playSound(
                    completeSound
                  );


                  messageElement.textContent =
                    "🎉 ખૂબ સરસ! તમે રમત પૂર્ણ કરી.";


                  restartButton.style.display =
                    "block";

                }


                /* ========================================
                   NORMAL CORRECT ANSWER
                ======================================== */

                else {

                  playSound(
                    correctSound
                  );


                  messageElement.textContent =
                    "✅ સાચો જવાબ!";

                }

              }


              /* ========================================
                 WRONG MATCH
              ======================================== */

              else {

                playSound(
                  wrongSound
                );


                const wrongLetter =
                  selectedLetter;


                wrongLetter.classList.add(
                  "wrong"
                );

                card.classList.add(
                  "wrong"
                );


                messageElement.textContent =
                  "❌ ફરી પ્રયત્ન કરો";


                setTimeout(
                  () => {

                    wrongLetter.classList.remove(
                      "wrong"
                    );

                    card.classList.remove(
                      "wrong"
                    );

                  },
                  500
                );

              }

            }
          );

        }
      );

    }


    /* ========================================
       NEW GAME BUTTON
    ======================================== */

    restartButton.addEventListener(
      "click",
      startGame
    );


    /* ========================================
       START FIRST GAME
    ======================================== */

    startGame();

  </script>

</body>
</html>
