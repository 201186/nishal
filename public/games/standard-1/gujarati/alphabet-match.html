<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>અક્ષર જોડો</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
    }

    body {
      font-family: Arial, "Noto Sans Gujarati", sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: clamp(10px, 2vw, 20px);
    }

    .game {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: clamp(12px, 2vw, 20px);
    }

    .header h1 {
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.2;
    }

    .header p {
      margin-top: 6px;
      color: #64748b;
      font-size: clamp(14px, 1.4vw, 17px);
    }

    .score {
      width: fit-content;
      margin: clamp(12px, 2vw, 18px) auto;
      padding: 8px 18px;
      border-radius: 12px;
      background: white;
      font-size: clamp(14px, 1.3vw, 17px);
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 2vw, 18px);
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.5vw, 12px);
    }

    .card {
      width: 100%;
      min-height: clamp(52px, 7vh, 66px);
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: white;
      padding: 10px 12px;
      color: #1e293b;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #6366f1;
    }

    .card.selected {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .card.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }

    .card.wrong {
      border-color: #dc2626;
      background: #fee2e2;
    }

    .message {
      min-height: 28px;
      margin-top: clamp(14px, 2vw, 20px);
      text-align: center;
      font-size: clamp(16px, 1.8vw, 20px);
      font-weight: 700;
    }

    .restart {
      display: none;
      margin: 14px auto 0;
      border: 0;
      border-radius: 12px;
      padding: 11px 22px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .game {
        max-width: 100%;
      }

      .board {
        gap: 8px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 56px;
        padding: 8px;
        font-size: 18px;
      }
    }

    /* Laptop / TV / Smart Board with short browser height */
    @media (min-width: 700px) and (max-height: 850px) {
      body {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .game {
        width: min(100%, 700px);
      }

      .header {
        margin-bottom: 10px;
      }

      .header h1 {
        font-size: 30px;
      }

      .header p {
        font-size: 15px;
      }

      .score {
        margin: 10px auto;
        padding: 7px 16px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 52px;
        padding: 8px 10px;
        font-size: 19px;
      }

      .message {
        min-height: 24px;
        margin-top: 12px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="game">

    <div class="header">
      <h1>🎯 અક્ષર જોડો</h1>
      <p>અક્ષરને તેના સાચા શબ્દ સાથે જોડો</p>
    </div>

    <div class="score">
      સ્કોર: <span id="score">0</span> / 5
    </div>

    <div class="board">

      <div class="column" id="letters">
        <button class="card" data-id="1">ક</button>
        <button class="card" data-id="2">ગ</button>
        <button class="card" data-id="3">મ</button>
        <button class="card" data-id="4">હ</button>
        <button class="card" data-id="5">બ</button>
      </div>

      <div class="column" id="words">
        <button class="card" data-id="3">મગર</button>
        <button class="card" data-id="1">કમળ</button>
        <button class="card" data-id="5">બકરી</button>
        <button class="card" data-id="4">હરણ</button>
        <button class="card" data-id="2">ગાય</button>
      </div>

    </div>

    <div class="message" id="message"></div>

    <button class="restart" id="restart">
      ફરી રમો
    </button>

  </main>

  <script>
    const letterCards = document.querySelectorAll("#letters .card");
    const wordCards = document.querySelectorAll("#words .card");

    const scoreElement = document.getElementById("score");
    const messageElement = document.getElementById("message");
    const restartButton = document.getElementById("restart");

    let selectedLetter = null;
    let score = 0;

    letterCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (card.classList.contains("correct")) return;

        letterCards.forEach((item) => {
          if (!item.classList.contains("correct")) {
            item.classList.remove("selected");
          }
        });

        selectedLetter = card;
        card.classList.add("selected");

        messageElement.textContent = "હવે સાચો શબ્દ પસંદ કરો";
      });
    });

    wordCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (!selectedLetter || card.classList.contains("correct")) return;

        if (selectedLetter.dataset.id === card.dataset.id) {
          selectedLetter.classList.remove("selected");
          selectedLetter.classList.add("correct");
          card.classList.add("correct");

          score++;
          scoreElement.textContent = score;
          messageElement.textContent = "✅ સાચો જવાબ!";

          selectedLetter = null;

          if (score === 5) {
            messageElement.textContent =
              "🎉 ખૂબ સરસ! તમે રમત પૂર્ણ કરી.";
            restartButton.style.display = "block";
          }
        } else {
          selectedLetter.classList.add("wrong");
          card.classList.add("wrong");

          messageElement.textContent = "❌ ફરી પ્રયત્ન કરો";

          setTimeout(() => {
            selectedLetter?.classList.remove("wrong");
            card.classList.remove("wrong");
          }, 500);
        }
      });
    });

    restartButton.addEventListener("click", () => {
      location.reload();
    });
  </script>

</body>
</html>
