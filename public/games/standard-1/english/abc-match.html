<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABC Match</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    .game {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: clamp(26px, 5vw, 40px);
      margin-bottom: 8px;
    }

    .header p {
      color: #64748b;
      font-size: 17px;
    }

    .score {
      width: fit-content;
      margin: 20px auto;
      padding: 10px 20px;
      background: white;
      border-radius: 14px;
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      width: 100%;
      min-height: 72px;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 16px;
      background: white;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #6366f1;
    }

    .card.selected {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .card.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }

    .card.wrong {
      border-color: #dc2626;
      background: #fee2e2;
    }

    .message {
      min-height: 32px;
      margin-top: 24px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .restart {
      display: none;
      margin: 20px auto 0;
      padding: 13px 24px;
      border: 0;
      border-radius: 14px;
      background: #4f46e5;
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .board {
        gap: 10px;
      }

      .card {
        min-height: 64px;
        padding: 10px;
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <main class="game">

    <div class="header">
      <h1>🔤 ABC Match</h1>
      <p>Match the capital letter with the correct small letter</p>
    </div>

    <div class="score">
      Score: <span id="score">0</span> / 5
    </div>

    <div class="board">

      <div class="column" id="capitalLetters">
        <button class="card" data-id="a">A</button>
        <button class="card" data-id="b">B</button>
        <button class="card" data-id="c">C</button>
        <button class="card" data-id="d">D</button>
        <button class="card" data-id="e">E</button>
      </div>

      <div class="column" id="smallLetters">
        <button class="card" data-id="c">c</button>
        <button class="card" data-id="a">a</button>
        <button class="card" data-id="e">e</button>
        <button class="card" data-id="b">b</button>
        <button class="card" data-id="d">d</button>
      </div>

    </div>

    <div class="message" id="message"></div>

    <button class="restart" id="restart">
      Play Again
    </button>

  </main>

  <script>
    const capitalCards =
      document.querySelectorAll("#capitalLetters .card");

    const smallCards =
      document.querySelectorAll("#smallLetters .card");

    const scoreElement =
      document.getElementById("score");

    const messageElement =
      document.getElementById("message");

    const restartButton =
      document.getElementById("restart");

    let selectedCapital = null;
    let score = 0;

    capitalCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (card.classList.contains("correct")) return;

        capitalCards.forEach((item) => {
          if (!item.classList.contains("correct")) {
            item.classList.remove("selected");
          }
        });

        selectedCapital = card;
        card.classList.add("selected");

        messageElement.textContent =
          "Now select the matching small letter";
      });
    });

    smallCards.forEach((card) => {
      card.addEventListener("click", () => {
        if (
          !selectedCapital ||
          card.classList.contains("correct")
        ) {
          return;
        }

        if (
          selectedCapital.dataset.id ===
          card.dataset.id
        ) {
          selectedCapital.classList.remove("selected");
          selectedCapital.classList.add("correct");

          card.classList.add("correct");

          score++;
          scoreElement.textContent = score;

          messageElement.textContent =
            "✅ Correct!";

          selectedCapital = null;

          if (score === 5) {
            messageElement.textContent =
              "🎉 Excellent! You completed the game.";

            restartButton.style.display = "block";
          }
        } else {
          const wrongCapital = selectedCapital;

          wrongCapital.classList.add("wrong");
          card.classList.add("wrong");

          messageElement.textContent =
            "❌ Try again";

          setTimeout(() => {
            wrongCapital.classList.remove("wrong");
            card.classList.remove("wrong");
          }, 500);
        }
      });
    });

    restartButton.addEventListener("click", () => {
      location.reload();
    });
  </script>

</body>
</html>
