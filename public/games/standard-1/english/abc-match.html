<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABC Object Match</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      padding: clamp(10px, 2vw, 20px);
    }

    .game {
      width: min(100%, 760px);
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: clamp(12px, 2vw, 20px);
    }

    .header h1 {
      font-size: clamp(26px, 3vw, 38px);
      line-height: 1.2;
    }

    .header p {
      margin-top: 6px;
      color: #64748b;
      font-size: clamp(14px, 1.4vw, 17px);
    }

    .score {
      width: fit-content;
      margin: clamp(12px, 2vw, 18px) auto;
      padding: 8px 18px;
      border-radius: 12px;
      background: white;
      font-size: clamp(14px, 1.3vw, 17px);
      font-weight: 700;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
    }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(10px, 2vw, 18px);
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1.5vw, 12px);
    }

    .card {
      width: 100%;
      min-height: clamp(54px, 7vh, 68px);
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      background: white;
      padding: 9px 12px;
      color: #1e293b;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .letter-card {
      font-size: clamp(24px, 3vw, 32px);
    }

    .object-card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .emoji {
      font-size: clamp(24px, 3vw, 32px);
    }

    .card:hover {
      transform: translateY(-1px);
      border-color: #6366f1;
    }

    .card.selected {
      border-color: #4f46e5;
      background: #eef2ff;
    }

    .card.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #166534;
      cursor: default;
    }

    .card.wrong {
      border-color: #dc2626;
      background: #fee2e2;
    }

    .message {
      min-height: 28px;
      margin-top: clamp(14px, 2vw, 20px);
      text-align: center;
      font-size: clamp(16px, 1.8vw, 20px);
      font-weight: 700;
    }

    .restart {
      display: none;
      margin: 14px auto 0;
      border: 0;
      border-radius: 12px;
      padding: 11px 22px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .restart:hover {
      background: #4338ca;
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .board {
        gap: 8px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 58px;
        padding: 8px 6px;
        font-size: 16px;
      }

      .letter-card {
        font-size: 25px;
      }

      .object-card {
        gap: 5px;
      }

      .emoji {
        font-size: 24px;
      }
    }

    /* Laptop / TV / Smart Board */
    @media (min-width: 700px) and (max-height: 850px) {
      body {
        padding-top: 10px;
        padding-bottom: 10px;
      }

      .game {
        width: min(100%, 700px);
      }

      .header {
        margin-bottom: 10px;
      }

      .header h1 {
        font-size: 30px;
      }

      .header p {
        font-size: 15px;
      }

      .score {
        margin: 10px auto;
        padding: 7px 16px;
      }

      .column {
        gap: 8px;
      }

      .card {
        min-height: 52px;
        padding: 7px 10px;
        font-size: 18px;
      }

      .letter-card {
        font-size: 25px;
      }

      .emoji {
        font-size: 25px;
      }

      .message {
        min-height: 24px;
        margin-top: 12px;
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="game">

    <div class="header">
      <h1>🔤 ABC Object Match</h1>
      <p>Match each letter with the correct object</p>
    </div>

    <div class="score">
      Score:
      <span id="score">0</span>
      /
      <span id="total">5</span>
    </div>

    <div class="board">
      <div class="column" id="letters"></div>
      <div class="column" id="objects"></div>
    </div>

    <div class="message" id="message"></div>

    <button
      class="restart"
      id="restart"
      type="button"
    >
      🔄 Play New Game
    </button>

  </main>

  <script>
    /* ABC + Emoji + Object */
    const allPairs = [
      { letter: "A", emoji: "🍎", word: "Apple" },
      { letter: "B", emoji: "⚽", word: "Ball" },
      { letter: "C", emoji: "🐱", word: "Cat" },
      { letter: "D", emoji: "🐶", word: "Dog" },
      { letter: "E", emoji: "🐘", word: "Elephant" },
      { letter: "F", emoji: "🐟", word: "Fish" },
      { letter: "G", emoji: "🍇", word: "Grapes" },
      { letter: "H", emoji: "🏠", word: "House" },
      { letter: "I", emoji: "🍦", word: "Ice Cream" },
      { letter: "J", emoji: "🧃", word: "Juice" },
      { letter: "K", emoji: "🪁", word: "Kite" },
      { letter: "L", emoji: "🦁", word: "Lion" },
      { letter: "M", emoji: "🐒", word: "Monkey" },
      { letter: "N", emoji: "🪺", word: "Nest" },
      { letter: "O", emoji: "🍊", word: "Orange" },
      { letter: "P", emoji: "🦜", word: "Parrot" },
      { letter: "Q", emoji: "👸", word: "Queen" },
      { letter: "R", emoji: "🐇", word: "Rabbit" },
      { letter: "S", emoji: "☀️", word: "Sun" },
      { letter: "T", emoji: "🐯", word: "Tiger" },
      { letter: "U", emoji: "☂️", word: "Umbrella" },
      { letter: "V", emoji: "🚐", word: "Van" },
      { letter: "W", emoji: "⌚", word: "Watch" },
      { letter: "X", emoji: "🎼", word: "Xylophone" },
      { letter: "Y", emoji: "🪀", word: "Yo-Yo" },
      { letter: "Z", emoji: "🦓", word: "Zebra" }
    ];

    const lettersContainer =
      document.getElementById("letters");

    const objectsContainer =
      document.getElementById("objects");

    const scoreElement =
      document.getElementById("score");

    const totalElement =
      document.getElementById("total");

    const messageElement =
      document.getElementById("message");

    const restartButton =
      document.getElementById("restart");

    const PAIRS_PER_GAME = 5;

    let selectedLetter = null;
    let score = 0;

    function shuffle(array) {
      const newArray = [...array];

      for (let i = newArray.length - 1; i > 0; i--) {
        const randomIndex =
          Math.floor(Math.random() * (i + 1));

        [
          newArray[i],
          newArray[randomIndex]
        ] = [
          newArray[randomIndex],
          newArray[i]
        ];
      }

      return newArray;
    }

    function startGame() {
      score = 0;
      selectedLetter = null;

      scoreElement.textContent = "0";
      totalElement.textContent = PAIRS_PER_GAME;

      messageElement.textContent = "";
      restartButton.style.display = "none";

      lettersContainer.innerHTML = "";
      objectsContainer.innerHTML = "";

      /* Select random 5 letters */
      const selectedPairs =
        shuffle(allPairs).slice(0, PAIRS_PER_GAME);

      const gamePairs =
        selectedPairs.map((pair, index) => ({
          ...pair,
          id: String(index)
        }));

      /* Letter cards */
      gamePairs.forEach((pair) => {
        const button =
          document.createElement("button");

        button.type = "button";
        button.className = "card letter-card";
        button.textContent = pair.letter;
        button.dataset.id = pair.id;

        lettersContainer.appendChild(button);
      });

      /* Shuffle object cards */
      const shuffledObjects = shuffle(gamePairs);

      shuffledObjects.forEach((pair) => {
        const button =
          document.createElement("button");

        button.type = "button";
        button.className = "card object-card";
        button.dataset.id = pair.id;

        button.innerHTML = `
          <span class="emoji">${pair.emoji}</span>
          <span>${pair.word}</span>
        `;

        objectsContainer.appendChild(button);
      });

      addGameEvents();
    }

    function addGameEvents() {
      const letterCards =
        document.querySelectorAll("#letters .card");

      const objectCards =
        document.querySelectorAll("#objects .card");

      /* Select letter */
      letterCards.forEach((card) => {
        card.addEventListener("click", () => {
          if (card.classList.contains("correct")) {
            return;
          }

          letterCards.forEach((item) => {
            if (!item.classList.contains("correct")) {
              item.classList.remove("selected");
            }
          });

          selectedLetter = card;
          card.classList.add("selected");

          messageElement.textContent =
            "Now select the correct object";
        });
      });

      /* Select object */
      objectCards.forEach((card) => {
        card.addEventListener("click", () => {
          if (
            !selectedLetter ||
            card.classList.contains("correct")
          ) {
            return;
          }

          /* Correct */
          if (
            selectedLetter.dataset.id ===
            card.dataset.id
          ) {
            selectedLetter.classList.remove("selected");
            selectedLetter.classList.add("correct");

            card.classList.add("correct");

            score++;
            scoreElement.textContent = score;

            messageElement.textContent =
              "✅ Correct!";

            selectedLetter = null;

            if (score === PAIRS_PER_GAME) {
              messageElement.textContent =
                "🎉 Excellent! You completed the game.";

              restartButton.style.display = "block";
            }
          }

          /* Wrong */
          else {
            const wrongLetter = selectedLetter;

            wrongLetter.classList.add("wrong");
            card.classList.add("wrong");

            messageElement.textContent =
              "❌ Try again";

            setTimeout(() => {
              wrongLetter.classList.remove("wrong");
              card.classList.remove("wrong");
            }, 500);
          }
        });
      });
    }

    restartButton.addEventListener(
      "click",
      startGame
    );

    startGame();
  </script>

</body>
</html>
